<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth.js"></script>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FosterPaws — Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #FFF8F0; color: #333; }
        nav {
          background: #fff; padding: 1rem 2rem;
          display: flex; align-items: center; justify-content: space-between;
          box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .nav-brand { font-size: 1.3rem; font-weight: 700; color: #C95A1A; }
        .nav-links a {
          margin-left: 1.2rem; text-decoration: none; color: #555;
          font-weight: 600; font-size: 0.9rem; transition: color 0.2s;
        }
        .nav-links a:hover { color: #C95A1A; }
        .btn-logout {
          background: none; border: 1.5px solid #C95A1A; color: #C95A1A;
          padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer;
          font-weight: 600; transition: all 0.2s;
        }
        .btn-logout:hover { background: #C95A1A; color: #fff; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .section-title { font-size: 1.3rem; font-weight: 700; color: #C95A1A; margin-bottom: 1rem; }
        .card {
          background: #fff; border-radius: 16px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 1.5rem; margin-bottom: 2rem;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.82rem; font-weight: 600; color: #666; }
        input, select, textarea {
          padding: 0.6rem 0.8rem; border: 1.5px solid #e5dbd4;
          border-radius: 9px; font-size: 0.95rem; outline: none;
          transition: border 0.2s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: #C95A1A; }
        textarea { resize: vertical; min-height: 80px; }
        .btn-primary {
          background: #C95A1A; color: #fff; border: none;
          padding: 0.7rem 1.5rem; border-radius: 10px; font-size: 0.95rem;
          font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
        }
        .btn-primary:hover { background: #a94515; }
        .requests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 1rem; }
        .req-card {
          background: #fff; border-radius: 14px; padding: 1.2rem;
          border: 1.5px solid #f0e6da; transition: box-shadow 0.2s;
        }
        .req-card:hover { box-shadow: 0 4px 16px rgba(201,90,26,0.12); }
        .req-card h3 { color: #C95A1A; font-size: 1rem; margin-bottom: 0.5rem; }
        .req-card p { font-size: 0.87rem; color: #555; margin-bottom: 3px; }
        .badge {
          display: inline-block; padding: 2px 10px; border-radius: 20px;
          font-size: 0.75rem; font-weight: 700; margin-top: 0.5rem;
        }
        .badge-open { background: #e8f5e9; color: #2e7d32; }
        .badge-filled { background: #fff3e0; color: #e65100; }
        .empty { color: #aaa; text-align: center; padding: 2rem; font-size: 0.95rem; }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 FosterPaws</div>
    <div class="nav-links">
        <a href="dashboard.html">My Requests</a>
        <a href="foster.html">Browse Fosters</a>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
</nav>

<main>
    <!-- Post a request -->
    <div class="card">
        <div class="section-title">Post a Foster Request</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="ownerName" placeholder="e.g. Priya Mehta"/>
            </div>
            <div class="form-group">
                <label>Pet Type</label>
                <select id="petType">
                    <option value="Dog">Dog</option>
                    <option value="Cat">Cat</option>
                    <option value="Bird">Bird</option>
                    <option value="Rabbit">Rabbit</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Breed</label>
                <input type="text" id="breed" placeholder="e.g. Golden Retriever"/>
            </div>
            <div class="form-group">
                <label>Days Needed</label>
                <input type="number" id="days" min="1" placeholder="e.g. 5"/>
            </div>
            <div class="form-group full">
                <label>Special Requirements</label>
                <textarea id="requirements" placeholder="e.g. Needs 2 walks/day, no other pets, vegetarian diet..."></textarea>
            </div>
        </div>
        <button class="btn-primary" onclick="postRequest()">🐾 Post Request</button>
    </div>

    <!-- Active requests -->
    <div class="section-title">Active Requests</div>
    <div class="requests-grid" id="requestsGrid">
        <div class="empty">Loading requests...</div>
    </div>
    <div style="margin-top:40px">

        <div class="section-title">
            Applications Received
        </div>

        <div id="applicationsContainer">

            <div class="empty">
                Loading applications...
            </div>

        </div>

    </div>
</main>

<script>

    const API='http://localhost:8080';

    async function postRequest(){

        const data={

            ownerName:
            document.getElementById('ownerName').value,

            petType:
            document.getElementById('petType').value,

            breed:
            document.getElementById('breed').value,

            days:
                parseInt(
                    document.getElementById('days').value
                ),

            requirements:
            document.getElementById('requirements').value,

            status:'OPEN'

        };

        if(
            !data.ownerName||
            !data.breed||
            !data.days
        ){
            alert('Please fill all fields');
            return;
        }

        await fetch(`${API}/requests`,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:
                JSON.stringify(data)

        });

        alert('Request posted');

        document.getElementById('ownerName').value='';
        document.getElementById('breed').value='';
        document.getElementById('days').value='';
        document.getElementById('requirements').value='';

        loadRequests();
        loadApplications();

    }



    async function loadRequests(){

        const res=
            await fetch(
                `${API}/requests`
            );

        const requests=
            await res.json();

        const grid=
            document.getElementById(
                'requestsGrid'
            );

        if(!requests.length){

            grid.innerHTML=
                '<div class="empty">No requests posted yet</div>';

            return;

        }

        grid.innerHTML=

            requests.map(r=>`

<div class="req-card">

<h3>

${r.petType}

—

${r.breed}

</h3>

<p>

Owner:
<strong>

${r.ownerName}

</strong>

</p>

<p>

Days:
${r.days}

</p>

<p>

${r.requirements||

            'No requirements'}

</p>

<span class="badge">

${r.status||

            'OPEN'}

</span>

</div>

`).join('');

    }



    async function loadApplications(){

        try{

            const reqRes=
                await fetch(
                    `${API}/requests`
                );

            const requests=
                await reqRes.json();

            let html='';

            for(const req of requests){

                const appRes=

                    await fetch(

                        `${API}/applications/request/${req.id}`

                    );

                const apps=
                    await appRes.json();

                if(!apps.length)
                    continue;

                html+=`

<div class="card">

<h2>

${req.petType}

—

${req.breed}

</h2>

`;

                apps.forEach(app=>{

                    let contact='';

                    if(
                        app.status==='ACCEPTED'
                    ){

                        contact=`

<div
style="
background:#ecfff0;
padding:12px;
margin-top:10px;
border-radius:10px;
">

<b>

Accepted

</b>

<br><br>

Contact:

${app.ownerContact||'-'}

<br>

Message:

${app.ownerMessage||'-'}

</div>

`;

                    }

                    html+=`

<div

style="
margin-top:15px;
padding:16px;
border:1px solid #eee;
border-radius:10px;
"

>

<p>

Foster ID:

<b>

${app.fosterId}

</b>

</p>

<p>

Experience:

${app.experience}

</p>

<p>

Identity Proof:

${app.idProofUrl}

</p>

<p>

Status:

<b>

${app.status}

</b>

</p>

${contact}

${
                        app.status==='PENDING'

                            ?

                            `

<div
style="
margin-top:15px;
">

<button
class="btn-primary"
onclick="acceptApplication(${app.id})">

Accept

</button>

<button

class="btn-primary"

style="
margin-left:10px;
background:red;
"

onclick="rejectApplication(${app.id})">

Reject

</button>

</div>

`

                            :''

                    }

</div>

`;

                });

                html+=`</div>`;

            }

            document.getElementById(
                'applicationsContainer'
            ).innerHTML=

                html||

                '<div class="empty">No applications received</div>';

        }

        catch(e){

            console.log(e);

        }

    }



    async function acceptApplication(id){

        const phone=

            prompt(
                'Enter contact number'
            );

        if(!phone)
            return;

        const msg=

            prompt(
                'Message for foster'
            );

        await fetch(

            `${API}/applications/${id}/accept`,

            {

                method:'PUT',

                headers:{
                    'Content-Type':'application/json'
                },

                body:
                    JSON.stringify({

                        ownerContact:phone,

                        ownerMessage:
                            msg||

                            'Your application is accepted'

                    })

            }

        );

        alert(
            'Application accepted'
        );

        loadApplications();

    }



    async function rejectApplication(id){

        await fetch(

            `${API}/applications/${id}/reject`,

            {

                method:'PUT'

            }

        );

        alert(
            'Application rejected'
        );

        loadApplications();

    }



    function logout(){

        localStorage.clear();

        window.location.href='login.html';

    }



    loadRequests();

    loadApplications();

</script>
</body>
</html>
