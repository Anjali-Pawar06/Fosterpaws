```html
<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>FosterPaws - Browse Pets</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#FFF8F0;
        }

        nav{
            height:75px;
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 40px;
            box-shadow:0 2px 12px rgba(0,0,0,.08);
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#C95A1A;
        }

        .rightNav{
            display:flex;
            gap:15px;
            align-items:center;
        }

        .notify{
            padding:10px 15px;
            background:#FFF3E6;
            border-radius:10px;
        }

        .logout{
            padding:10px 16px;
            background:#C95A1A;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:35px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(420px,420px));
            justify-content:center;
            gap:25px;
        }

        .card{
            background:white;
            padding:18px;
            border-radius:18px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
            width:420px;
        }

        .petImage{
            width:100%;
            height:260px;
            object-fit:cover;
            border-radius:12px;
            background:#eee;
        }

        .card h2{
            margin-top:15px;
            color:#C95A1A;
        }

        .card p{
            margin-top:10px;
        }

        .applyBtn{
            width:100%;
            padding:14px;
            margin-top:20px;
            background:#C95A1A;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .applyBtn:disabled{
            background:#bbb;
        }

        .status{
            margin-top:15px;
            padding:12px;
            border-radius:10px;
        }

        .pending{
            background:#FFF3CD;
        }

        .accepted{
            background:#D4EDDA;
        }

        .rejected{
            background:#F8D7DA;
        }

        .popup{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.45);
            justify-content:center;
            align-items:center;
        }

        .box{
            width:430px;
            background:white;
            padding:25px;
            border-radius:16px;
        }

        .box textarea,
        .box select,
        .box input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:1px solid #ddd;
            border-radius:10px;
        }

        .box button{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .submit{
            background:#C95A1A;
            color:white;
        }

        .cancel{
            background:#888;
            color:white;
        }

    </style>

</head>

<body>

<nav>

    <div class="logo">
        🐾 FosterPaws
    </div>

    <div class="rightNav">

        <div class="notify">
            🔔
            <span id="notificationCount">
0
</span>
        </div>

        <button
                class="logout"
                onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container">

    <h1>Available Requests</h1>

    <br>

    <div
            id="requests"
            class="grid">

        Loading...

    </div>

</div>

<div
        class="popup"
        id="popup">

    <div class="box">

        <h2>Apply to Foster</h2>

        <textarea
                id="experience"
                placeholder="Tell owner about your experience">
</textarea>

        <select id="living">
            <option>Apartment</option>
            <option>House</option>
            <option>House with Garden</option>
        </select>

        <select id="proofType">
            <option value="">
                Select Identity Proof
            </option>
            <option>Aadhar Card</option>
            <option>PAN Card</option>
            <option>Driving License</option>
        </select>

        <input
                id="proofUrl"
                placeholder="Paste proof URL"
        />

        <button
                class="submit"
                onclick="submitApplication()">

            Submit

        </button>

        <button
                class="cancel"
                onclick="closePopup()">

            Cancel

        </button>

    </div>

</div>

<script>

    const API="http://localhost:8080";

    const fosterId=
        localStorage.getItem("userId");

    let selectedRequest=null;

    async function load(){

        try{

            let requests=
                await fetch(API+"/requests");

            requests=
                await requests.json();

            let apps=
                await fetch(
                    API+
                    "/applications/foster/"
                    +
                    fosterId
                );

            apps=
                await apps.json();

            document
                .getElementById(
                    "notificationCount"
                )
                .innerText=
                apps.filter(
                    a=>
                        a.status==="ACCEPTED"
                ).length;

            const div=
                document.getElementById(
                    "requests"
                );

            div.innerHTML="";

            requests.forEach(r=>{

                const app=
                    apps.find(
                        a=>
                            a.requestId===r.id
                    );

                let image=
                    r.petImage;

                if(
                    !image
                    ||
                    image==="null"
                ){

                    image=
                        "https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e";

                }

                let html=`

<div class="card">

<img
class="petImage"
src="${image}"

onerror="
this.src='https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e'
"
>

<h2>${r.petType}</h2>

<p>👤 Owner: ${r.ownerName}</p>

<p>🐾 Breed: ${r.breed}</p>

<p>📅 Days: ${r.days}</p>

<p>📝 ${r.requirements||"No requirements"}</p>

`;

                if(app){

                    html+=`

<div
class="
status
${app.status.toLowerCase()}
">

<b>
${app.status}
</b>

`;

                    if(app.status==="ACCEPTED"){

                        html+=`

<br><br>

🎉 Accepted

<br><br>

📞 Contact:
<b>

${app.ownerContact||"Not shared"}

</b>

<br><br>

💬 Message:

<div
style="
background:white;
padding:10px;
border-radius:10px;
">

${app.ownerMessage||"No message provided"}

</div>

`;

                    }

                    else if(app.status==="REJECTED"){

                        html+=`

<br><br>

❌ Rejected

`;

                    }

                    else{

                        html+=`

<br><br>

⏳ Waiting for owner

`;

                    }

                    html+=`

</div>

<button
disabled
class="applyBtn">

Applied

</button>

`;

                }

                else{

                    html+=`

<button
class="applyBtn"
onclick="openPopup(${r.id})">

Apply

</button>

`;

                }

                html+=`</div>`;

                div.innerHTML+=html;

            });

        }

        catch{

            document.getElementById(
                "requests"
            ).innerHTML=
                "Unable to load";

        }

    }

    function openPopup(id){

        selectedRequest=id;

        document
            .getElementById(
                "popup"
            )
            .style.display=
            "flex";

    }

    function closePopup(){

        document
            .getElementById(
                "popup"
            )
            .style.display=
            "none";

    }

    async function submitApplication(){

        const exp=
            document
                .getElementById(
                    "experience"
                )
                .value
                .trim();

        const living=
            document
                .getElementById(
                    "living"
                )
                .value;

        const proof=
            document
                .getElementById(
                    "proofType"
                )
                .value;

        const proofUrl=
            document
                .getElementById(
                    "proofUrl"
                )
                .value
                .trim();

        if(
            !exp
            ||
            !proof
            ||
            !proofUrl
        ){

            alert(
                "Fill all fields"
            );

            return;

        }

        const res=
            await fetch(

                API+
                "/applications",

                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({

                            requestId:
                            selectedRequest,

                            fosterId:
                                Number(
                                    fosterId
                                ),

                            experience:
                                exp+
                                " | "+
                                living,

                            idProofUrl:
                                proof+
                                " : "+
                                proofUrl,

                            status:
                                "PENDING"

                        })

                }

            );

        if(res.ok){

            alert(
                "Application Submitted"
            );

            closePopup();

            load();

        }

    }

    function logout(){

        localStorage.clear();

        location.href=
            "login.html";

    }

    load();

    setInterval(
        load,
        5000
    );

</script>

</body>

</html>
```
